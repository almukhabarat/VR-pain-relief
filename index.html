<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vermindering van pijn en spanning</title>
  
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.5.0/dist/aframe-environment-component.min.js"></script>
  <!-- <script src="https://unpkg.com/aframe-super-hands-component@3.0.6/dist/aframe-super-hands-component.min.js"></script> -->
  <!-- <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script> -->
   <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  <script src="https://unpkg.com/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>

  <script src="objects.js" defer></script>
  <script src="water.js" defer></script>
  <script src="progress-ui.js" defer></script>
</head>
<body>

  <a-scene object-manager physics="gravity: -9.8; debug: true;" renderer="antialias: true; colorManagement: true;">
    <a-assets>
       <img id="sky-texture" src="assets/environment.jpg">
       <img id="water-normal" src="https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/waternormals.jpg">
       <img id="ui-font" src="assets/fonts/InterTight-Medium.png">
       <a-asset-item id="island-model" src="assets/island.glb"></a-asset-item>
       <a-asset-item id="platform-model" src="assets/platform.glb"></a-asset-item>
    </a-assets>

    <a-sky src="#sky-texture" position="0 -15 0" rotation="0 0 0" scale="0.3 0.3 0.3"></a-sky>

    <a-light id="ambient-glow" 
            type="hemisphere" 
            color="#8ecae6" 
            groundColor="#023047" 
            intensity="2">
    </a-light>

    <a-light id="reflection-source" 
            type="directional" 
            position="-10 10 -10" 
            intensity="1" 
            target="#water">
    </a-light>

    <a-ocean 
        width="100" depth="100" 
        density="40" 
        speed="0.005" 
        amplitude="0.05"
        position="-40.898 -3.000 54.006" 
        rotation="-90 -36.560 0"
        scale="5 5 1"
        color="#145b63" 
        ocean-texture> 
    </a-ocean>

    <a-entity 
      gltf-model="#island-model" 
      position="0 76 0" 
      rotation="-90 0 0" 
      shadow="receive: true">
    </a-entity>

    <a-entity id="intro-panel" 
              position="-22 1.8 23.5"
              rotation="0 -45 0" 
>
      
      <a-entity geometry="primitive: plane; width: 2.5; height: 2" 
                material="color: #023047; opacity: 0.9; transparent: true"
                position="0 0.15 0">
      </a-entity>
      
      <a-entity 
        text="value: Welkom bij de VR-omgeving!\n\nDe VR-omgeving waarin jij zo in beland is bedoelt om afleiding te creëren als je pijn of spanning ervaart. Je bevind je op een eiland. Je ziet allemaal objecten zweven om je heen. De bedoeling is dat jij de objecten te pakken krijgt en ze plaatst op het platform waar je op staat. Je kan continue spelen met de objecten en de objecten verdwijnen zodra je ze legt op het platform.\n\nVeel plezier!; 
              align: center; 
              width: 2.2; 
              color: #8ecae6; 
              wrapCount: 45;
              font: assets/fonts/InterTight-Medium-msdf.json;
              fontImage: assets/fonts/InterTight-Medium.png;
              negate: false;
              alphaTest: 0.5;"
        position="0 0.35 0.05">
      </a-entity>

      <!-- <a-entity id="start-button"
                class="interactable"
                geometry="primitive: plane; width: 0.6; height: 0.2"
                material="color: #fb8500"
                position="0 -0.5 0.1" 
                text="value: START; align: center; width: 2; color: white">
      </a-entity> -->
    </a-entity>

    <a-entity id="goal-panel" 
          position="-25 2 21" 
          text="value: Loading goals...; align: center; width: 2; color: #8ecae6;"
          geometry="primitive: plane; width: 2.2; height: 0.5"
          material="color: #023047; opacity: 0.8; transparent: true"
          progress-ui>
    </a-entity>

    <a-entity 
      id="rig" 
      movement-controls="controls: thumbstick, keyboard; speed: 0.2; fly: false;"
      position="-24 0.6 26.6" 
      rotation="0 0 0">

        <a-camera look-controls position="0 1.6 0">
          <a-entity cursor="rayOrigin: mouse" 
                    raycaster="objects: .interactable"
                    point-beam> </a-entity>
        </a-camera>
        
        <a-entity 
          id="leftHand" 
          laser-controls="hand: left" 
          raycaster="objects: .interactable; far: 25" 
          line="color: #8ecae6; opacity: 0.5"
          point-beam>
        </a-entity>

        <a-entity 
          id="rightHand" 
          laser-controls="hand: right" 
          raycaster="objects: .interactable; far: 25" 
          line="color: #8ecae6; opacity: 0.5"
          point-beam>
        </a-entity>
      </a-entity>

  </a-scene>
</body>
</html>
